<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>선잇기 퍼즐</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
      }
      header {
        padding: 8px 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        flex-wrap: wrap;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      header select, header button {
        font-size: 14px;
        padding: 6px 10px;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      #status {
        margin-left: auto;
        font-size: 13px;
        color: #555;
      }
      #board-container {
        flex: 1;
        position: relative;
        min-height: 0;
        padding: 8px;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🧩 선잇기 퍼즐</h1>
      <select id="level-select"></select>
      <button id="hint-btn" title="힌트">💡</button>
      <button id="mute-btn" title="음소거">🔊</button>
      <button id="reset-btn">다시 시작</button>
      <span id="status">로딩...</span>
    </header>
    <div id="board-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="./build/main.js"></script>
  </body>
</html>
